quantum:
  execution_mode: heron   # heron | simulator | auto

  simulator:
    shots: 2048
    noise_model: null

  heron:
    # Set to a backend you have access to, e.g. ibm_brisbane or ibm_fez (if available)
    backend: ${IBM_BACKEND}
    shots: 2000
    max_runtime_minutes: 20
    use_dynamical_decoupling: true
    # Optional runtime mitigation/optimization knobs (applied only if supported by your qiskit-ibm-runtime version)
    # Common convention: resilience_level (0-3), optimization_level (0-3)
    resilience_level: 1
    optimization_level: 1
    # Optional: enable runtime error mitigation features if exposed (kept best-effort)
    enable_dynamical_decoupling: true

  ibm_quantum:
    token: ${IBM_Q_TOKEN}
    instance: ibm-q/open/main
