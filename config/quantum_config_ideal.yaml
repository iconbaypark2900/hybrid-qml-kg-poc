quantum:
  execution_mode: simulator   # simulator | heron | auto

  simulator:
    shots: 2048
    noise_model: null

  heron:
    backend: ibm_torino
    shots: 2000
    max_runtime_minutes: 20
    use_dynamical_decoupling: true

  ibm_quantum:
    token: ${IBM_Q_TOKEN}
    instance: ibm-q/open/main
