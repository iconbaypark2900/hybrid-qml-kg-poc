quantum:
  execution_mode: simulator   # simulator | heron | auto

  simulator:
    shots: 2048
    noise_model: null         # e.g., "ibm_heron_noise" if you have a saved model

  heron:
    backend: ibm_torino
    shots: 2000
    # optimization_level: 3  # REMOVED - not supported in new API
    max_runtime_minutes: 20
    use_dynamical_decoupling: true

  ibm_quantum:
    token: ${IBM_Q_TOKEN}     # pulled from .env
    instance: ibm-q/open/main # put your hub/group/project here if different
