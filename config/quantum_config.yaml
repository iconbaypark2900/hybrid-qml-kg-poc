quantum:
  execution_mode: heron   # simulator | heron | auto

  simulator:
    shots: 2048
    noise_model: null         # e.g., "ibm_heron_noise" if you have a saved model

  heron:
    backend: ibm_torino
    shots: 2000
    # optimization_level: 3  # REMOVED - not supported in new API
    max_runtime_minutes: 20
    use_dynamical_decoupling: true

  ibm_quantum:
    token: ${IBM_Q_TOKEN}              # or set IBM_QUANTUM_TOKEN in .env (executor accepts both)
    channel: ibm_quantum_platform      # override with IBM_QUANTUM_CHANNEL if needed
    instance: ${IBM_QUANTUM_INSTANCE}  # optional: CRN from Instances page (Open Plan); omit via empty .env
