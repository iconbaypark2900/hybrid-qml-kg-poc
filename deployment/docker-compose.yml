# deployment/docker-compose.yml
version: '3.8'

services:
  # Knowledge Graph API Service
  kg-api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.cli
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../results:/app/results
      - ../config:/app/config
    environment:
      - PYTHONPATH=/app
      - IBM_QUANTUM_TOKEN=${IBM_QUANTUM_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Benchmarking Dashboard
  dashboard:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.dashboard
    ports:
      - "8501:8501"
    volumes:
      - ../results:/app/results
      - ../docs:/app/docs
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    depends_on:
      kg-api:
        condition: service_healthy

  # Optional: Jupyter Notebook Server (for development)
  notebooks:
    image: jupyter/datascience-notebook:python-3.9
    ports:
      - "8888:8888"
    volumes:
      - ..:/home/jovyan/work
    working_dir: /home/jovyan/work/notebooks
    command: ["jupyter", "notebook", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--NotebookApp.token=''", "--NotebookApp.password=''"]
    restart: unless-stopped

volumes:
  data:
  models:
  results:
  docs:
  config: